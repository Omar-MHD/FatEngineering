<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaatEng | صيانة المصاعد والأدراج الكهربائية</title>
    <link rel="stylesheet" href="auth-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        
        <div class="auth-container">
            
            <div class="auth-toggle">
                <button id="toggleLogin" class="toggle-btn active">تسجيل الدخول</button>
                <button id="toggleSignUp" class="toggle-btn">إنشاء حساب جديد</button>
            </div>

            <form id="loginForm" class="auth-form">
                <h2>مرحباً بك مجدداً</h2>
                <p>سجل دخولك لإدارة مواعيد صيانة المصاعد والأدراج</p>
                
                <div class="input-group">
                    <label for="loginEmail">البريد الإلكتروني:</label>
                    <input type="email" id="loginEmail" required placeholder="name@example.com">
                </div>
                
                <div class="input-group">
                    <label for="loginPassword">كلمة المرور:</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="auth-submit-btn">دخول</button>
            </form>

            <form id="signUpForm" class="auth-form hidden">
                <h2>انضم إلى FatEngineering</h2>
                <p>أنشئ حسابك الآن للحصول على خدمات صيانة فورية وضمان الأمان</p>
                
                <div class="input-group">
                    <label for="signUpName">الاسم الكامل:</label>
                    <input type="text" id="signUpName" required placeholder="أدخل اسمك الثلاثي">
                </div>

                <div class="input-group">
                    <label for="signUpEmail">البريد الإلكتروني:</label>
                    <input type="email" id="signUpEmail" required placeholder="name@example.com">
                </div>
                
                <div class="input-group">
                    <label for="signUpPassword">كلمة المرور:</label>
                    <input type="password" id="signUpPassword" required placeholder="ثنائية، تشمل أرقام وحروف">
                </div>
                
                <button type="submit" class="auth-submit-btn signup-color">تأكيد التسجيل</button>
            </form>

        </div>
    </div>

    <div id="authToast" class="auth-toast">
        <div class="toast-icon">✓</div>
        <div class="toast-text" id="authToastText"></div>
    </div>

    <script src="auth-script.js"></script>
</body>
</html>
