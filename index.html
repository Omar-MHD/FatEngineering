<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FatEng</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">FatEng <span>📐</span></div>
            <nav>
                <ul>
                    <li><a href="#" class="active">الرئيسية</a></li>
                    <li><a href="#">من نحن</a></li>
                    <li><a href="#">طاقم المهندسين</a></li>
                    <li><a href="#">حجز موعد</a></li>
                    <li><a href="#">اتصل بنا</a></li>
                </ul>
            </nav>
            <button class="logout-btn">خروج</button>
        </div>
    </header>

    <main class="container">
        <div class="form-card">
            <h2>جدولة طلب صيانة هندسية</h2>
            <p class="subtitle">أدخل تفاصيل الخدمة لتخصيص المهندس المناسب فوراً</p>

            <form id="maintenanceForm">
                
                <div class="input-group">
                    <label for="clientName">👤 الاسم الثلاثي للعميل</label>
                    <input type="text" id="clientName" name="clientName" placeholder="عمر فؤاد المحمد" required>
                </div>

                <div class="input-group">
                    <label for="serviceType">⚡ اختر نوع الخدمة الهندسية</label>
                    <select id="serviceType" name="serviceType" required>
                        <option value="" disabled selected>اختر الخدمة المطوبة...</option>
                        <option value="إصلاح سلم أو درج ميكانيكي متحرك">إصلاح سلم أو درج ميكانيكي متحرك</option>
                        <option value="صيانة أنظمة تكييف مركزي">صيانة أنظمة تكييف مركزي</option>
                        <option value="استشارة هندسية ومخططات">استشارة هندسية ومخططات</option>
                        <option value="صيانة وإصلاح مولدات طاقة">صيانة وإصلاح مولدات طاقة</option>
                    </select>
                </div>

                <div class="row">
                    <div class="input-group col">
                        <label for="visitDate">📅 تاريخ الزيارة</label>
                        <input type="date" id="visitDate" name="visitDate" required>
                    </div>

                    <div class="input-group col">
                        <label for="arrivalTime">⏰ توقيت الوصول</label>
                        <input type="time" id="arrivalTime" name="arrivalTime" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">تأكيد طلب الصيانة الفوري</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
